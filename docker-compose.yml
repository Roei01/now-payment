version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./apps/backend/data:/app/apps/backend/data

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
